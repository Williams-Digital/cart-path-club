<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CartPath Admin</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon.png">
  <style>
    :root {
      --bg: #060F0A;
      --bg-card: #0D1F16;
      --bg-card-hover: #111F16;
      --bg-elevated: #142419;
      --gold: #BF9B3B;
      --gold-light: #CCAB52;
      --gold-dim: rgba(191, 155, 59, 0.15);
      --cream: #F5F0E1;
      --cream-muted: rgba(245, 240, 225, 0.5);
      --cream-dim: rgba(245, 240, 225, 0.25);
      --green-accent: #10352A;
      --green-accent2: #1A3F30;
      --green-ok: #4CAF50;
      --green-ok-dim: rgba(76, 175, 80, 0.15);
      --red: #E57373;
      --red-dim: rgba(229, 115, 115, 0.15);
      --amber: #F5A623;
      --amber-dim: rgba(245, 166, 35, 0.15);
      --border: rgba(245, 240, 225, 0.08);
      --border-light: rgba(245, 240, 225, 0.12);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--cream);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* LOGIN GATE */
    .login-gate {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .login-box {
      width: 100%;
      max-width: 380px;
      text-align: center;
    }

    .login-brand {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 4px;
      color: var(--gold);
      margin-bottom: 8px;
    }

    .login-title {
      font-size: 22px;
      font-weight: 600;
      color: var(--cream);
      margin-bottom: 32px;
    }

    .login-input {
      width: 100%;
      padding: 14px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 8px;
      color: var(--cream);
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 16px;
    }

    .login-input:focus { border-color: var(--gold); }
    .login-input::placeholder { color: var(--cream-dim); }

    .login-btn {
      width: 100%;
      padding: 14px;
      background: var(--gold);
      color: var(--bg);
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .login-btn:hover { background: var(--gold-light); }

    .login-error {
      color: var(--red);
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }

    /* DASHBOARD */
    .dashboard { display: none; min-height: 100vh; }
    .dashboard.active { display: block; }

    /* Top Bar */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 32px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .topbar-brand {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 4px;
      color: var(--gold);
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .topbar-email {
      font-size: 12px;
      color: var(--cream-muted);
    }

    .new-app-indicator {
      display: none;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 500;
      color: var(--gold);
      background: var(--gold-dim);
      padding: 6px 12px;
      border-radius: 20px;
      animation: pulse-gold 2s infinite;
    }

    .new-app-indicator.visible { display: flex; }

    @keyframes pulse-gold {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    .new-app-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--gold);
    }

    .logout-btn {
      padding: 8px 16px;
      background: transparent;
      border: 1px solid var(--border-light);
      border-radius: 6px;
      color: var(--cream-muted);
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .logout-btn:hover {
      color: var(--cream);
      border-color: var(--cream-dim);
    }

    /* Main Content */
    .main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 32px 32px 64px;
    }

    /* Stats Row */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 16px;
    }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
    }

    .stat-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--cream-muted);
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 32px;
      font-weight: 700;
      color: var(--cream);
      line-height: 1;
    }

    .stat-card.pending .stat-value { color: var(--gold); }
    .stat-card.approved .stat-value { color: var(--green-ok); }
    .stat-card.declined .stat-value { color: var(--cream-muted); }

    /* Tier Breakdown */
    .tier-breakdown {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      align-items: center;
    }

    .tier-breakdown-label {
      font-size: 10px;
      color: var(--cream-dim);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-right: 4px;
    }

    .tier-breakdown-badge {
      background: rgba(16, 53, 42, 0.5);
      border: 1px solid rgba(191, 155, 59, 0.08);
      border-radius: 4px;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tier-breakdown-badge .tier-name {
      font-size: 11px;
      font-weight: 600;
    }

    .tier-breakdown-badge .tier-count {
      font-size: 14px;
      color: var(--cream);
      font-weight: 700;
    }

    /* Chart */
    .chart-section {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px 24px;
      margin-bottom: 24px;
    }

    .chart-title {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--cream-muted);
      margin-bottom: 16px;
    }

    .chart-container {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      height: 100px;
      padding-top: 8px;
    }

    .chart-bar-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }

    .chart-bar {
      width: 100%;
      max-width: 40px;
      background: var(--gold);
      border-radius: 3px 3px 0 0;
      min-height: 2px;
      transition: height 0.3s ease;
      position: relative;
    }

    .chart-bar:hover {
      background: var(--gold-light);
    }

    .chart-bar-count {
      font-size: 9px;
      color: var(--cream-muted);
      text-align: center;
      line-height: 1;
    }

    .chart-bar-label {
      font-size: 9px;
      color: var(--cream-dim);
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      width: 100%;
    }

    /* Search + Date Filters Row */
    .search-date-row {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      align-items: center;
    }

    .search-wrap {
      flex: 1;
      position: relative;
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gold);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      padding: 12px 16px 12px 42px;
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 8px;
      color: var(--cream);
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-input:focus { border-color: var(--gold); }
    .search-input::placeholder { color: var(--cream-dim); }

    .date-filter-group {
      display: flex;
      gap: 0;
      border: 1px solid var(--border-light);
      border-radius: 8px;
      overflow: hidden;
    }

    .date-filter-btn {
      padding: 10px 16px;
      background: transparent;
      border: none;
      color: var(--cream-muted);
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      border-right: 1px solid var(--border-light);
    }

    .date-filter-btn:last-child { border-right: none; }

    .date-filter-btn.active {
      background: var(--gold-dim);
      color: var(--gold);
    }

    .date-filter-btn:hover:not(.active) {
      color: var(--cream);
    }

    /* Export Button */
    .export-btn {
      padding: 10px 20px;
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 8px;
      color: var(--cream-muted);
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .export-btn:hover {
      color: var(--cream);
      border-color: var(--cream-dim);
    }

    .export-btn svg { width: 14px; height: 14px; }

    /* Filter Tabs */
    .filter-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0;
    }

    .filter-tab {
      padding: 10px 16px;
      background: none;
      border: none;
      color: var(--cream-muted);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .filter-tab:hover { color: var(--cream); }

    .filter-tab.active {
      color: var(--gold);
      border-bottom-color: var(--gold);
    }

    .tab-badge {
      font-size: 11px;
      font-weight: 600;
      background: var(--border);
      color: var(--cream-muted);
      padding: 1px 7px;
      border-radius: 10px;
      min-width: 20px;
      text-align: center;
    }

    .filter-tab.active .tab-badge {
      background: var(--gold-dim);
      color: var(--gold);
    }

    /* Table */
    .table-wrapper {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .table-header {
      display: grid;
      grid-template-columns: 100px 1.3fr 1.1fr 100px 100px 180px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--cream-dim);
    }

    .table-header > div {
      cursor: pointer;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .table-header > div:first-child {
      cursor: default;
    }

    .sort-arrow {
      font-size: 10px;
      opacity: 0.4;
      transition: opacity 0.2s;
    }

    .sort-arrow.active { opacity: 1; color: var(--gold); }

    .app-row {
      display: grid;
      grid-template-columns: 100px 1.3fr 1.1fr 100px 100px 180px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      align-items: center;
      cursor: pointer;
      transition: background 0.15s;
    }

    .app-row:hover { background: var(--bg-card-hover); }
    .app-row:last-child { border-bottom: none; }
    .app-row.expanded { background: var(--bg-card-hover); border-bottom: none; }

    .row-checkbox {
      width: 16px;
      height: 16px;
      accent-color: var(--gold);
      cursor: pointer;
    }

    .cell-date {
      font-size: 13px;
      color: var(--cream-muted);
    }

    .cell-name { font-size: 14px; font-weight: 500; }
    .cell-email { font-size: 12px; color: var(--cream-muted); margin-top: 2px; }
    .cell-company { font-size: 14px; font-weight: 500; }
    .cell-title { font-size: 12px; color: var(--cream-muted); margin-top: 2px; }

    /* Tier Badges */
    .tier-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .tier-badge.founders { background: var(--gold-dim); color: var(--gold); }
    .tier-badge.chairmans { background: rgba(192,192,192,0.15); color: #C0C0C0; }
    .tier-badge.executive { background: var(--border); color: var(--cream-muted); }

    /* Status Badges */
    .status-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .status-badge.pending { background: var(--gold-dim); color: var(--gold); }
    .status-badge.approved { background: var(--green-ok-dim); color: var(--green-ok); }
    .status-badge.declined { background: var(--red-dim); color: var(--red); }
    .status-badge.removed { background: rgba(200,60,60,0.12); color: #E06060; }

    /* Email Status */
    .email-status {
      font-size: 11px;
      color: var(--cream-dim);
    }

    /* Payment Placeholder */
    .payment-badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      background: var(--amber-dim);
      color: var(--amber);
    }

    /* Action Buttons */
    .action-btns {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .btn-approve {
      padding: 6px 12px;
      background: var(--green-ok-dim);
      color: var(--green-ok);
      border: 1px solid rgba(76,175,80,0.25);
      border-radius: 6px;
      font-family: inherit;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-approve:hover { background: var(--green-ok); color: #fff; }

    .btn-decline {
      padding: 6px 12px;
      background: transparent;
      color: var(--cream-muted);
      border: 1px solid var(--border-light);
      border-radius: 6px;
      font-family: inherit;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-decline:hover {
      background: var(--red-dim);
      color: var(--red);
      border-color: rgba(229,115,115,0.25);
    }

    .btn-waive {
      padding: 6px 12px;
      font-family: inherit;
      font-size: 11px;
      font-weight: 600;
      border: 1px solid rgba(100,180,255,0.3);
      background: rgba(100,180,255,0.08);
      color: #7CB8F0;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-waive:hover {
      background: rgba(100,180,255,0.15);
      border-color: rgba(100,180,255,0.5);
    }

    .btn-remove {
      padding: 6px 12px;
      font-family: inherit;
      font-size: 11px;
      font-weight: 600;
      border: 1px solid rgba(200,60,60,0.3);
      background: rgba(200,60,60,0.08);
      color: #E06060;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-remove:hover {
      background: rgba(200,60,60,0.15);
      border-color: rgba(200,60,60,0.5);
    }

    .btn-resend {
      padding: 6px 12px;
      font-family: inherit;
      font-size: 11px;
      font-weight: 600;
      border: 1px solid rgba(191,155,59,0.3);
      background: rgba(191,155,59,0.08);
      color: var(--gold);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-resend:hover {
      background: rgba(191,155,59,0.15);
      border-color: rgba(191,155,59,0.5);
    }

    .btn-resend:disabled, .btn-approve:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .detail-actions .btn-approve,
    .detail-actions .btn-decline,
    .detail-actions .btn-waive,
    .detail-actions .btn-remove,
    .detail-actions .btn-resend {
      padding: 10px 24px;
      font-size: 12px;
    }

    /* Expanded Row Detail */
    .app-detail {
      display: none;
      padding: 0 20px 20px;
      background: var(--bg-card-hover);
      border-bottom: 1px solid var(--border);
    }

    .app-detail.open { display: block; }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      padding: 20px;
      background: var(--bg);
      border-radius: 8px;
      margin-bottom: 16px;
    }

    .detail-item label {
      display: block;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--cream-dim);
      margin-bottom: 4px;
    }

    .detail-item span {
      font-size: 14px;
      color: var(--cream);
    }

    /* Internal Notes */
    .notes-section {
      background: var(--bg);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .notes-section-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--cream-dim);
      margin-bottom: 12px;
    }

    .notes-list {
      margin-bottom: 12px;
    }

    .note-entry {
      padding: 10px 12px;
      background: var(--bg-card);
      border-radius: 6px;
      margin-bottom: 8px;
      font-size: 13px;
      color: var(--cream);
      line-height: 1.5;
    }

    .note-entry .note-time {
      font-size: 10px;
      color: var(--cream-dim);
      margin-bottom: 4px;
    }

    .note-textarea {
      width: 100%;
      min-height: 60px;
      background: var(--bg-card);
      color: var(--cream);
      border: 1px solid var(--border-light);
      border-radius: 6px;
      padding: 10px 12px;
      font-family: inherit;
      font-size: 13px;
      resize: vertical;
      outline: none;
      margin-bottom: 8px;
    }

    .note-textarea:focus { border-color: var(--gold); }
    .note-textarea::placeholder { color: var(--cream-dim); }

    .btn-save-note {
      padding: 8px 16px;
      background: var(--gold-dim);
      color: var(--gold);
      border: 1px solid rgba(191,155,59,0.25);
      border-radius: 6px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-save-note:hover {
      background: var(--gold);
      color: var(--bg);
    }

    /* Application Timeline */
    .timeline-section {
      background: var(--bg);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .timeline-section-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--cream-dim);
      margin-bottom: 16px;
    }

    .timeline {
      display: flex;
      align-items: center;
      gap: 0;
      position: relative;
    }

    .timeline-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      flex: 1;
      position: relative;
    }

    .timeline-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--border);
      border: 2px solid var(--border-light);
      z-index: 2;
      transition: all 0.2s;
    }

    .timeline-dot.completed {
      background: var(--gold);
      border-color: var(--gold);
    }

    .timeline-dot.active {
      background: var(--gold);
      border-color: var(--gold-light);
      box-shadow: 0 0 8px rgba(191,155,59,0.4);
    }

    .timeline-line {
      position: absolute;
      top: 6px;
      left: 50%;
      right: -50%;
      height: 2px;
      background: var(--border);
      z-index: 1;
    }

    .timeline-line.completed { background: var(--gold); }

    .timeline-step:last-child .timeline-line { display: none; }

    .timeline-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--cream-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .timeline-label.completed { color: var(--gold); }

    .timeline-date {
      font-size: 9px;
      color: var(--cream-dim);
    }

    .detail-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    /* Bulk Action Bar */
    .bulk-action-bar {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg-card);
      border: 1px solid var(--gold);
      border-radius: 12px;
      padding: 14px 24px;
      display: none;
      align-items: center;
      gap: 16px;
      z-index: 200;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    .bulk-action-bar.visible { display: flex; }

    .bulk-count {
      font-size: 13px;
      font-weight: 600;
      color: var(--gold);
      white-space: nowrap;
    }

    .bulk-approve-btn {
      padding: 8px 20px;
      background: var(--green-ok);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .bulk-approve-btn:hover { background: #66BB6A; }

    .bulk-decline-btn {
      padding: 8px 20px;
      background: var(--red-dim);
      color: var(--red);
      border: 1px solid rgba(229,115,115,0.25);
      border-radius: 6px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .bulk-decline-btn:hover {
      background: var(--red);
      color: #fff;
    }

    .bulk-clear {
      font-size: 12px;
      color: var(--cream-muted);
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      text-decoration: underline;
    }

    .bulk-clear:hover { color: var(--cream); }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 64px 24px;
      color: var(--cream-muted);
    }

    .empty-state-icon { font-size: 40px; margin-bottom: 16px; opacity: 0.3; }
    .empty-state-title { font-size: 16px; font-weight: 600; color: var(--cream); margin-bottom: 8px; }
    .empty-state-text { font-size: 13px; max-width: 400px; margin: 0 auto; line-height: 1.6; }

    /* Loading */
    .loading-wrap { text-align: center; padding: 64px 24px; }

    .spinner {
      width: 28px;
      height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text { font-size: 13px; color: var(--cream-muted); }

    /* Error */
    .error-wrap { text-align: center; padding: 48px 24px; }
    .error-msg { font-size: 14px; color: var(--red); margin-bottom: 16px; }

    .btn-retry {
      padding: 10px 24px;
      background: transparent;
      border: 1px solid var(--border-light);
      border-radius: 6px;
      color: var(--cream);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-retry:hover { border-color: var(--cream-dim); }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 500;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .modal-overlay.active { display: flex; }

    .modal {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 12px;
      padding: 32px;
      max-width: 440px;
      width: 100%;
    }

    .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; }

    .modal-text {
      font-size: 14px;
      color: var(--cream-muted);
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .modal-reason-wrap {
      margin: 0 0 20px;
    }

    .modal-reason-label {
      display: block;
      font-size: 11px;
      color: var(--cream-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .modal-reason-textarea {
      width: 100%;
      min-height: 80px;
      background: var(--green-accent);
      color: var(--cream);
      border: 1px solid rgba(191,155,59,0.15);
      border-radius: 4px;
      padding: 12px;
      font-family: inherit;
      font-size: 13px;
      resize: vertical;
      outline: none;
    }

    .modal-reason-textarea:focus { border-color: var(--gold); }
    .modal-reason-textarea::placeholder { color: var(--cream-dim); }

    .modal-btns {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }

    .modal-cancel {
      padding: 10px 20px;
      background: transparent;
      border: 1px solid var(--border-light);
      border-radius: 6px;
      color: var(--cream-muted);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .modal-cancel:hover { color: var(--cream); border-color: var(--cream-dim); }

    .modal-confirm {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .modal-confirm.approve { background: var(--green-ok); color: #fff; }
    .modal-confirm.approve:hover { background: #66BB6A; }
    .modal-confirm.decline { background: var(--red); color: #fff; }
    .modal-confirm.decline:hover { background: #EF9A9A; }
    .modal-confirm.remove { background: #C03C3C; color: #fff; }
    .modal-confirm.remove:hover { background: #D04040; }
    .modal-confirm:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Toast */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 600;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      padding: 14px 20px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-light);
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      color: var(--cream);
      animation: toast-in 0.3s ease-out;
      max-width: 360px;
    }

    .toast.success { border-color: rgba(76,175,80,0.4); }
    .toast.error { border-color: rgba(229,115,115,0.4); }

    @keyframes toast-in {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .toast.fade-out {
      animation: toast-out 0.3s ease-in forwards;
    }

    @keyframes toast-out {
      from { opacity: 1; }
      to { opacity: 0; }
    }

    /* MOBILE */
    @media (max-width: 768px) {
      .topbar { padding: 14px 16px; }
      .topbar-email { display: none; }
      .main { padding: 20px 16px 48px; }

      .stats-row {
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }

      .stat-card { padding: 16px; }
      .stat-value { font-size: 26px; }

      .search-date-row {
        flex-direction: column;
      }

      .date-filter-group { width: 100%; }
      .date-filter-btn { flex: 1; text-align: center; }

      .chart-container { height: 60px; }

      .filter-tabs {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }

      .filter-tab {
        white-space: nowrap;
        padding: 10px 12px;
        font-size: 12px;
      }

      .table-header { display: none; }

      .app-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding: 16px;
      }

      .app-row .row-checkbox-wrap { order: 0; }
      .cell-date { order: 1; font-size: 12px; width: auto; }
      .cell-status-wrap { order: 2; margin-left: auto; }
      .cell-name-wrap { order: 3; width: 100%; }
      .cell-name { font-size: 15px; }
      .cell-company-wrap { order: 4; width: 100%; }
      .cell-tier-wrap { order: 5; }
      .cell-email-status { order: 6; }
      .cell-actions { order: 7; width: 100%; }

      .detail-grid {
        grid-template-columns: 1fr;
        gap: 12px;
        padding: 16px;
      }

      .detail-actions { flex-direction: column; }

      .timeline {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }

      .timeline-step {
        flex-direction: row;
        gap: 12px;
      }

      .timeline-line {
        display: none;
      }

      .bulk-action-bar {
        left: 16px;
        right: 16px;
        transform: none;
        flex-wrap: wrap;
        justify-content: center;
      }

      .toast-container {
        left: 16px;
        right: 16px;
        bottom: 16px;
      }

      .toast { max-width: none; }
    }

    @media (max-width: 480px) {
      .stats-row { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

  <!-- LOGIN GATE -->
  <div class="login-gate" id="loginGate">
    <div class="login-box">
      <div class="login-brand">CARTPATH ADMIN</div>
      <div class="login-title">Admin Dashboard</div>
      <form id="loginForm" onsubmit="return handleLogin(event)">
        <input type="email" class="login-input" id="emailInput" placeholder="Email" autocomplete="email" style="margin-bottom: 12px;">
        <input type="password" class="login-input" id="passwordInput" placeholder="Password" autocomplete="off">
        <button type="submit" class="login-btn">Access Dashboard</button>
      </form>
      <div class="login-error" id="loginError">Invalid email or password.</div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="dashboard" id="dashboard">
    <div class="topbar">
      <div class="topbar-brand">CARTPATH ADMIN</div>
      <div class="topbar-right">
        <div class="new-app-indicator" id="newAppIndicator">
          <div class="new-app-dot"></div>
          New application!
        </div>
        <span class="topbar-email" id="topbarEmail"></span>
        <button class="logout-btn" onclick="handleLogout()">Log Out</button>
      </div>
    </div>

    <div class="main">
      <!-- Stats -->
      <div class="stats-row" id="statsRow">
        <div class="stat-card">
          <div class="stat-label">Total Applications</div>
          <div class="stat-value" id="statTotal">-</div>
        </div>
        <div class="stat-card pending" id="statPendingCard">
          <div class="stat-label">Pending Review</div>
          <div class="stat-value" id="statPending">-</div>
        </div>
        <div class="stat-card approved">
          <div class="stat-label">Approved</div>
          <div class="stat-value" id="statApproved">-</div>
        </div>
        <div class="stat-card declined">
          <div class="stat-label">Declined</div>
          <div class="stat-value" id="statDeclined">-</div>
        </div>
      </div>

      <!-- Tier Breakdown -->
      <div class="tier-breakdown" id="tierBreakdown" style="display:none;"></div>

      <!-- Chart -->
      <div class="chart-section" id="chartSection">
        <div class="chart-title">Applications -- Last 14 Days</div>
        <div class="chart-container" id="chartContainer"></div>
      </div>

      <!-- Search + Date Filters + Export -->
      <div class="search-date-row">
        <div class="search-wrap">
          <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" class="search-input" id="searchInput" placeholder="Search by name, email, or company..." oninput="applyClientFilters()">
        </div>
        <div class="date-filter-group">
          <button class="date-filter-btn active" data-range="all" onclick="setDateFilter('all')">All Time</button>
          <button class="date-filter-btn" data-range="month" onclick="setDateFilter('month')">This Month</button>
          <button class="date-filter-btn" data-range="week" onclick="setDateFilter('week')">This Week</button>
        </div>
        <button class="export-btn" onclick="exportCSV()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Export CSV
        </button>
      </div>

      <!-- Filter Tabs -->
      <div class="filter-tabs" id="filterTabs">
        <button class="filter-tab active" data-filter="all" onclick="setFilter('all')">All <span class="tab-badge" id="badgeAll">0</span></button>
        <button class="filter-tab" data-filter="pending" onclick="setFilter('pending')">Pending <span class="tab-badge" id="badgePending">0</span></button>
        <button class="filter-tab" data-filter="approved" onclick="setFilter('approved')">Approved <span class="tab-badge" id="badgeApproved">0</span></button>
        <button class="filter-tab" data-filter="declined" onclick="setFilter('declined')">Declined <span class="tab-badge" id="badgeDeclined">0</span></button>
        <button class="filter-tab" data-filter="removed" onclick="setFilter('removed')">Removed <span class="tab-badge" id="badgeRemoved">0</span></button>
      </div>

      <!-- Content area -->
      <div id="contentArea">
        <div class="loading-wrap" id="loadingState">
          <div class="spinner"></div>
          <div class="loading-text">Loading applications...</div>
        </div>
      </div>
    </div>
  </div>

  <!-- BULK ACTION BAR -->
  <div class="bulk-action-bar" id="bulkActionBar">
    <span class="bulk-count" id="bulkCount">0 selected</span>
    <button class="bulk-approve-btn" onclick="openBulkModal('approve')">Approve All</button>
    <button class="bulk-decline-btn" onclick="openBulkModal('decline')">Decline All</button>
    <button class="bulk-clear" onclick="clearSelection()">Clear Selection</button>
  </div>

  <!-- MODAL -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-text" id="modalText"></div>
      <div class="modal-reason-wrap" id="modalReasonWrap" style="display:none;">
        <label class="modal-reason-label" id="modalReasonLabel">Reason</label>
        <textarea class="modal-reason-textarea" id="modalReasonTextarea" placeholder=""></textarea>
      </div>
      <div class="modal-btns">
        <button class="modal-cancel" onclick="closeModal()">Cancel</button>
        <button class="modal-confirm" id="modalConfirm" onclick="confirmAction()">Confirm</button>
      </div>
    </div>
  </div>

  <!-- TOAST CONTAINER -->
  <div class="toast-container" id="toastContainer"></div>

  <script>
    const API = 'https://ha2sinzpu3.execute-api.us-east-1.amazonaws.com/prod';
    const ADMINS = {
      'dylan@williamsdigital.io': 'CartPath2026!',
      'msowell@cartpathclub.com': 'CartPath2026!'
    };

    let currentFilter = 'all';
    let currentDateFilter = 'all';
    let currentSort = { col: 'date', dir: 'desc' };
    let applications = [];
    let allApplications = [];
    let stats = { total: 0, pending: 0, approved: 0, declined: 0, removed: 0 };
    let expandedId = null;
    let pendingAction = null;
    let pollInterval = null;
    let lastTotal = null;
    let selectedIds = new Set();

    // AUTH
    function getToken() {
      return sessionStorage.getItem('cartpath_admin_token');
    }

    function getEmail() {
      return sessionStorage.getItem('cartpath_admin_email') || '';
    }

    function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('emailInput').value.trim().toLowerCase();
      const pw = document.getElementById('passwordInput').value;
      if (ADMINS[email] && ADMINS[email] === pw) {
        sessionStorage.setItem('cartpath_admin_token', pw);
        sessionStorage.setItem('cartpath_admin_email', email);
        showDashboard();
      } else {
        document.getElementById('loginError').style.display = 'block';
        document.getElementById('passwordInput').value = '';
        document.getElementById('passwordInput').focus();
      }
      return false;
    }

    function handleLogout() {
      sessionStorage.removeItem('cartpath_admin_token');
      sessionStorage.removeItem('cartpath_admin_email');
      if (pollInterval) clearInterval(pollInterval);
      document.getElementById('dashboard').classList.remove('active');
      document.getElementById('loginGate').style.display = 'flex';
      document.getElementById('passwordInput').value = '';
      document.getElementById('loginError').style.display = 'none';
    }

    function showDashboard() {
      document.getElementById('loginGate').style.display = 'none';
      document.getElementById('dashboard').classList.add('active');
      document.getElementById('topbarEmail').textContent = 'Logged in as ' + getEmail();
      loadData();
      startPolling();
    }

    if (getToken() && Object.values(ADMINS).includes(getToken())) {
      showDashboard();
    }

    // API HELPERS
    function apiHeaders() {
      return { 'Authorization': 'Bearer ' + getToken(), 'Content-Type': 'application/json' };
    }

    async function fetchApplications() {
      const res = await fetch(API + '/applications', { headers: apiHeaders() });
      if (!res.ok) throw new Error('Failed to load applications');
      return res.json();
    }

    async function fetchStats() {
      const res = await fetch(API + '/applications/stats', { headers: apiHeaders() });
      if (!res.ok) throw new Error('Failed to load stats');
      return res.json();
    }

    async function approveApplication(id, waiveFee) {
      const res = await fetch(API + '/applications/' + id + '/approve', {
        method: 'PATCH',
        headers: apiHeaders(),
        body: JSON.stringify({ waiveFee: waiveFee || false })
      });
      if (!res.ok) throw new Error('Failed to approve');
      return res.json();
    }

    async function declineApplication(id, reason) {
      const res = await fetch(API + '/applications/' + id + '/decline', {
        method: 'PATCH',
        headers: apiHeaders(),
        body: JSON.stringify({ reason: reason || '' })
      });
      if (!res.ok) throw new Error('Failed to decline');
      return res.json();
    }

    async function removeMember(id, reason) {
      const res = await fetch(API + '/applications/' + id + '/remove', {
        method: 'PATCH',
        headers: apiHeaders(),
        body: JSON.stringify({ reason: reason || '' })
      });
      if (!res.ok) throw new Error('Failed to remove member');
      return res.json();
    }

    // DATA LOADING
    async function loadData() {
      showLoading();
      try {
        const [apps, st] = await Promise.all([fetchApplications(), fetchStats()]);
        allApplications = Array.isArray(apps) ? apps : (apps.applications || apps.data || []);
        stats = {
          total: st.total || 0,
          pending: st.pending || 0,
          approved: st.approved || 0,
          declined: st.declined || 0,
          removed: st.removed || 0,
          byTier: st.byTier || []
        };
        updateStats();
        renderChart();
        applyClientFilters();
      } catch (err) {
        showError(err.message);
      }
    }

    function showLoading() {
      document.getElementById('contentArea').innerHTML = '<div class="loading-wrap"><div class="spinner"></div><div class="loading-text">Loading applications...</div></div>';
    }

    function showError(msg) {
      document.getElementById('contentArea').innerHTML =
        '<div class="error-wrap"><div class="error-msg">' + escapeHtml(msg) + '</div><button class="btn-retry" onclick="loadData()">Retry</button></div>';
    }

    // STATS
    function updateStats() {
      document.getElementById('statTotal').textContent = stats.total;
      document.getElementById('statPending').textContent = stats.pending;
      document.getElementById('statApproved').textContent = stats.approved;
      document.getElementById('statDeclined').textContent = stats.declined;

      const pendingCard = document.getElementById('statPendingCard');
      if (stats.pending > 0) {
        pendingCard.classList.add('pending');
      } else {
        pendingCard.classList.remove('pending');
      }

      // Tier breakdown
      const tierDiv = document.getElementById('tierBreakdown');
      if (stats.byTier && stats.byTier.length > 0) {
        let html = '<span class="tier-breakdown-label">By Tier:</span>';
        stats.byTier.forEach(function(t) {
          const tierName = t.tier || 'Unknown';
          let color = '#BF9B3B';
          if (tierName.toLowerCase().includes('founder')) color = '#BF9B3B';
          else if (tierName.toLowerCase().includes('chairman')) color = '#A8B8C8';
          else color = '#F5F0E1';
          html += '<div class="tier-breakdown-badge"><span class="tier-name" style="color:' + color + '">' + escapeHtml(tierName) + '</span><span class="tier-count">' + t.count + '</span></div>';
        });
        tierDiv.innerHTML = html;
        tierDiv.style.display = 'flex';
      } else {
        tierDiv.style.display = 'none';
      }

      document.getElementById('badgeAll').textContent = stats.total;
      document.getElementById('badgePending').textContent = stats.pending;
      document.getElementById('badgeApproved').textContent = stats.approved;
      document.getElementById('badgeDeclined').textContent = stats.declined;
      document.getElementById('badgeRemoved').textContent = stats.removed;
    }

    // CHART
    function renderChart() {
      const container = document.getElementById('chartContainer');
      const now = new Date();
      const days = [];
      for (let i = 13; i >= 0; i--) {
        const d = new Date(now);
        d.setDate(d.getDate() - i);
        days.push({
          key: d.toISOString().split('T')[0],
          label: (d.getMonth() + 1) + '/' + d.getDate(),
          count: 0
        });
      }

      allApplications.forEach(function(app) {
        const raw = app.created_at || '';
        if (!raw) return;
        const dateKey = new Date(raw).toISOString().split('T')[0];
        const day = days.find(function(d) { return d.key === dateKey; });
        if (day) day.count++;
      });

      const maxCount = Math.max(1, ...days.map(function(d) { return d.count; }));
      let html = '';
      days.forEach(function(day) {
        const h = Math.max(2, (day.count / maxCount) * 80);
        html += '<div class="chart-bar-wrap">';
        html += '<div class="chart-bar-count">' + (day.count > 0 ? day.count : '') + '</div>';
        html += '<div class="chart-bar" style="height:' + h + 'px" title="' + day.key + ': ' + day.count + '"></div>';
        html += '<div class="chart-bar-label">' + day.label + '</div>';
        html += '</div>';
      });
      container.innerHTML = html;
    }

    // FILTERS
    function setFilter(filter) {
      currentFilter = filter;
      document.querySelectorAll('.filter-tab').forEach(function(tab) {
        tab.classList.toggle('active', tab.dataset.filter === filter);
      });
      expandedId = null;
      selectedIds.clear();
      updateBulkBar();
      applyClientFilters();
    }

    function setDateFilter(range) {
      currentDateFilter = range;
      document.querySelectorAll('.date-filter-btn').forEach(function(btn) {
        btn.classList.toggle('active', btn.dataset.range === range);
      });
      applyClientFilters();
    }

    function applyClientFilters() {
      let filtered = allApplications.slice();

      // Status filter
      if (currentFilter !== 'all') {
        filtered = filtered.filter(function(app) {
          return (app.status || 'pending').toLowerCase() === currentFilter;
        });
      }

      // Date filter
      if (currentDateFilter !== 'all') {
        const now = new Date();
        let cutoff;
        if (currentDateFilter === 'week') {
          cutoff = new Date(now);
          cutoff.setDate(cutoff.getDate() - 7);
        } else if (currentDateFilter === 'month') {
          cutoff = new Date(now.getFullYear(), now.getMonth(), 1);
        }
        if (cutoff) {
          filtered = filtered.filter(function(app) {
            const raw = app.created_at || '';
            if (!raw) return false;
            return new Date(raw) >= cutoff;
          });
        }
      }

      // Search
      const query = (document.getElementById('searchInput').value || '').trim().toLowerCase();
      if (query) {
        filtered = filtered.filter(function(app) {
          const name = (app.name || '').toLowerCase();
          const email = (app.email || '').toLowerCase();
          const company = (app.company || '').toLowerCase();
          return name.includes(query) || email.includes(query) || company.includes(query);
        });
      }

      // Sort
      filtered.sort(function(a, b) {
        let va, vb;
        if (currentSort.col === 'date') {
          va = new Date(a.created_at || 0).getTime();
          vb = new Date(b.created_at || 0).getTime();
        } else if (currentSort.col === 'name') {
          va = (a.name || '').toLowerCase();
          vb = (b.name || '').toLowerCase();
        } else if (currentSort.col === 'tier') {
          va = (a.tier || '').toLowerCase();
          vb = (b.tier || '').toLowerCase();
        } else if (currentSort.col === 'status') {
          va = (a.status || 'pending').toLowerCase();
          vb = (b.status || 'pending').toLowerCase();
        }
        let cmp;
        if (typeof va === 'number') {
          cmp = va - vb;
        } else {
          cmp = va < vb ? -1 : va > vb ? 1 : 0;
        }
        return currentSort.dir === 'desc' ? -cmp : cmp;
      });

      applications = filtered;
      renderTable();
    }

    function toggleSort(col) {
      if (currentSort.col === col) {
        currentSort.dir = currentSort.dir === 'desc' ? 'asc' : 'desc';
      } else {
        currentSort.col = col;
        currentSort.dir = col === 'date' ? 'desc' : 'asc';
      }
      applyClientFilters();
    }

    // HELPERS
    function getAppId(app) {
      return app.id || app.applicationId || app.application_id || '';
    }

    function getAppName(app) {
      return (app.name || '').trim() || 'Unknown';
    }

    function getAppTier(app) {
      return app.tier || 'executive';
    }

    function getTierClass(tier) {
      const t = tier.toLowerCase().replace(/[^a-z]/g, '');
      if (t.includes('founder')) return 'founders';
      if (t.includes('chairman')) return 'chairmans';
      return 'executive';
    }

    function getTierLabel(tierClass) {
      if (tierClass === 'founders') return "Founder's";
      if (tierClass === 'chairmans') return "Chairman's";
      return 'Executive';
    }

    function formatDate(dateStr) {
      if (!dateStr) return '--';
      try {
        const d = new Date(dateStr);
        if (isNaN(d.getTime())) return dateStr;
        const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        return months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
      } catch (e) {
        return dateStr;
      }
    }

    function formatTimestamp(ts) {
      if (!ts) return '';
      const d = new Date(ts);
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const h = d.getHours();
      const m = d.getMinutes();
      const ampm = h >= 12 ? 'PM' : 'AM';
      return months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear() + ' ' + (h % 12 || 12) + ':' + (m < 10 ? '0' : '') + m + ' ' + ampm;
    }

    function escapeHtml(str) {
      if (!str) return '';
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    function escapeAttr(str) {
      return (str || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
    }

    // INTERNAL NOTES (localStorage)
    function getInternalNotes(appId) {
      try {
        const data = JSON.parse(localStorage.getItem('cartpath_notes_' + appId) || '[]');
        return Array.isArray(data) ? data : [];
      } catch (e) {
        return [];
      }
    }

    function saveInternalNote(appId) {
      const textarea = document.getElementById('noteInput-' + appId);
      if (!textarea) return;
      const text = textarea.value.trim();
      if (!text) return;
      const notes = getInternalNotes(appId);
      notes.unshift({ text: text, time: new Date().toISOString(), by: getEmail() });
      localStorage.setItem('cartpath_notes_' + appId, JSON.stringify(notes));
      textarea.value = '';
      renderTable();
    }

    // SELECTION
    function toggleSelectAll() {
      const pendingApps = applications.filter(function(app) {
        return (app.status || 'pending').toLowerCase() === 'pending';
      });
      const allChecked = pendingApps.length > 0 && pendingApps.every(function(app) {
        return selectedIds.has(getAppId(app));
      });
      if (allChecked) {
        selectedIds.clear();
      } else {
        pendingApps.forEach(function(app) {
          selectedIds.add(getAppId(app));
        });
      }
      updateBulkBar();
      renderTable();
    }

    function toggleSelect(id, e) {
      if (e) e.stopPropagation();
      if (selectedIds.has(id)) {
        selectedIds.delete(id);
      } else {
        selectedIds.add(id);
      }
      updateBulkBar();
      updateCheckboxes();
    }

    function updateCheckboxes() {
      document.querySelectorAll('.row-checkbox').forEach(function(cb) {
        cb.checked = selectedIds.has(cb.dataset.id);
      });
      const selectAll = document.getElementById('selectAllCheckbox');
      if (selectAll) {
        const pendingApps = applications.filter(function(app) {
          return (app.status || 'pending').toLowerCase() === 'pending';
        });
        selectAll.checked = pendingApps.length > 0 && pendingApps.every(function(app) {
          return selectedIds.has(getAppId(app));
        });
      }
    }

    function clearSelection() {
      selectedIds.clear();
      updateBulkBar();
      updateCheckboxes();
    }

    function updateBulkBar() {
      const bar = document.getElementById('bulkActionBar');
      if (selectedIds.size > 0) {
        bar.classList.add('visible');
        document.getElementById('bulkCount').textContent = selectedIds.size + ' selected';
      } else {

      }

    // RENDER TABLE
    function renderTable() {

        }
        html += '</div>';

        // Detail panel
        html += '<div class="app-detail' + (isExpanded ? ' open' : '') + '" id="detail-' + escapeAttr(id) + '">';
        html += '<div class="detail-grid">';
        html += detailField('Phone', phone);
        html += detailField('City', city);

        html += detailField('Home Course', homeCourse);

        html += '<div class="timeline-section">';

        html += '<div class="timeline-step">';
        html += '<div class="timeline-dot ' + (hasReview ? 'active' : '') + '"></div>';

        html += '<div class="notes-section">';

          internalNotes.forEach(function(n) {
            html += '<div class="note-entry"><div class="note-time">' + escapeHtml(formatTimestamp(n.time)) + (n.by ? ' - ' + escapeHtml(n.by) : '') + '</div>' + escapeHtml(n.text) + '</div>';

        html += '<textarea class="note-textarea" id="noteInput-' + escapeAttr(id) + '" placeholder="Add a private note..." onclick="event.stopPropagation()"></textarea>';

          html += '<button class="btn-approve" onclick="event.stopPropagation(); openModal(\'approve\', \'' + escapeAttr(id) + '\', \'' + escapeAttr(name) + '\', \'' + escapeAttr(email) + '\', \'' + escapeAttr(tierLabel) + '\')">Approve Application</button>';
          html += '<button class="btn-waive" onclick="event.stopPropagation(); openModal(\'waive\', \'' + escapeAttr(id) + '\', \'' + escapeAttr(name) + '\', \'' + escapeAttr(email) + '\', \'' + escapeAttr(tierLabel) + '\')">Approve &amp; Waive Fee</button>';
          html += '<button class="btn-decline" onclick="event.stopPropagation(); openModal(\'decline\', \'' + escapeAttr(id) + '\', \'' + escapeAttr(name) + '\', \'' + escapeAttr(email) + '\', \'' + escapeAttr(tierLabel) + '\')">Decline Application</button>';
          html += '</div>';
        } else if (status === 'approved') {
          html += '<div class="detail-actions">';
          html += '<button class="btn-resend" onclick="event.stopPropagation(); confirmResend(\'' + escapeAttr(id) + '\', \'' + escapeAttr(name) + '\', \'' + escapeAttr(email) + '\', this)">Resend Welcome Email &amp; Payment Link</button>';
          html += '<button class="btn-remove" onclick="event.stopPropagation(); openModal(\'remove\', \'' + escapeAttr(id) + '\', \'' + escapeAttr(name) + '\', \'' + escapeAttr(email) + '\', \'' + escapeAttr(tierLabel) + '\')">Remove Member</button>';

    }

    function detailField(label, value) {
      return '<div class="detail-item"><label>' + escapeHtml(label) + '</label><span>' + escapeHtml(value || '--') + '</span></div>';
    }

    function toggleExpand(id) {
      expandedId = expandedId === id ? null : id;
      renderTable();
    }

    // MODAL
    function openModal(action, id, name, email, tier) {
      pendingAction = { action: action, id: id, name: name, email: email, tier: tier, bulk: false };
      const titleEl = document.getElementById('modalTitle');
      const textEl = document.getElementById('modalText');
      const confirmBtn = document.getElementById('modalConfirm');
      const reasonWrap = document.getElementById('modalReasonWrap');
      const reasonLabel = document.getElementById('modalReasonLabel');
      const reasonTextarea = document.getElementById('modalReasonTextarea');

      reasonWrap.style.display = 'none';
      reasonTextarea.value = '';

      if (action === 'approve') {
        titleEl.textContent = 'Approve Application';
        textEl.textContent = 'Approve ' + name + ' for ' + tier + '? This will send them a welcome email with Stripe payment link.';
        confirmBtn.textContent = 'Approve';
        confirmBtn.className = 'modal-confirm approve';
      } else if (action === 'waive') {
        titleEl.textContent = 'Approve & Waive Fee';
        textEl.textContent = 'Approve ' + name + ' for ' + tier + ' with fee waived? They will receive a welcome email WITHOUT a payment link.';
        confirmBtn.textContent = 'Approve & Waive';
        confirmBtn.className = 'modal-confirm approve';
      } else if (action === 'remove') {
        titleEl.textContent = 'Remove Member';
        textEl.textContent = 'Remove ' + name + ' from CartPath? Their membership will be revoked.';
        confirmBtn.textContent = 'Remove Member';
        confirmBtn.className = 'modal-confirm remove';
        reasonWrap.style.display = 'block';
        reasonLabel.textContent = 'Reason for Removal';
        reasonTextarea.placeholder = 'e.g. Membership cancelled, violation of terms, non-payment, etc.';
        setTimeout(function() { reasonTextarea.focus(); }, 100);
      } else if (action === 'decline') {
        titleEl.textContent = 'Decline Application';
        textEl.textContent = "Decline " + name + "'s application? Please provide a reason below.";
        confirmBtn.textContent = 'Decline';
        confirmBtn.className = 'modal-confirm decline';
        reasonWrap.style.display = 'block';
        reasonLabel.textContent = 'Reason for Decline';
        reasonTextarea.placeholder = 'e.g. Incomplete application, outside service area, etc.';
        setTimeout(function() { reasonTextarea.focus(); }, 100);
      }

      confirmBtn.disabled = false;
      document.getElementById('modalOverlay').classList.add('active');
    }

    function openBulkModal(action) {
      const count = selectedIds.size;
      if (count === 0) return;

      pendingAction = { action: action, bulk: true, ids: Array.from(selectedIds) };
      const titleEl = document.getElementById('modalTitle');
      const textEl = document.getElementById('modalText');
      const confirmBtn = document.getElementById('modalConfirm');
      const reasonWrap = document.getElementById('modalReasonWrap');
      const reasonLabel = document.getElementById('modalReasonLabel');
      const reasonTextarea = document.getElementById('modalReasonTextarea');

      reasonWrap.style.display = 'none';
      reasonTextarea.value = '';

      if (action === 'approve') {
        titleEl.textContent = 'Bulk Approve';
        textEl.textContent = 'Approve ' + count + ' application' + (count > 1 ? 's' : '') + '? Each will receive a welcome email with payment link.';
        confirmBtn.textContent = 'Approve ' + count;
        confirmBtn.className = 'modal-confirm approve';
      } else if (action === 'decline') {
        titleEl.textContent = 'Bulk Decline';
        textEl.textContent = 'Decline ' + count + ' application' + (count > 1 ? 's' : '') + '?';
        confirmBtn.textContent = 'Decline ' + count;
        confirmBtn.className = 'modal-confirm decline';
        reasonWrap.style.display = 'block';
        reasonLabel.textContent = 'Reason for Decline (shared)';
        reasonTextarea.placeholder = 'e.g. Incomplete application, outside service area, etc.';
        setTimeout(function() { reasonTextarea.focus(); }, 100);
      }

      confirmBtn.disabled = false;
      document.getElementById('modalOverlay').classList.add('active');
    }

    function closeModal(e) {
      if (e && e.target !== document.getElementById('modalOverlay')) return;
      document.getElementById('modalOverlay').classList.remove('active');
      pendingAction = null;
    }

    async function confirmAction() {
      if (!pendingAction) return;
      const btn = document.getElementById('modalConfirm');
      btn.disabled = true;
      btn.textContent = 'Processing...';

      try {
        if (pendingAction.bulk) {
          // Bulk actions
          const ids = pendingAction.ids;
          if (pendingAction.action === 'approve') {
            for (let i = 0; i < ids.length; i++) {
              await approveApplication(ids[i]);
            }
            showToast('Approved ' + ids.length + ' application' + (ids.length > 1 ? 's' : ''), 'success');
          } else if (pendingAction.action === 'decline') {
            const reason = document.getElementById('modalReasonTextarea').value.trim();
            for (let i = 0; i < ids.length; i++) {
              await declineApplication(ids[i], reason);
            }
            showToast('Declined ' + ids.length + ' application' + (ids.length > 1 ? 's' : ''), 'success');
          }
          selectedIds.clear();
          updateBulkBar();
        } else {
          // Single actions
          if (pendingAction.action === 'approve') {
            await approveApplication(pendingAction.id);
            showToast('Approved! Welcome email sent to ' + pendingAction.email, 'success');
          } else if (pendingAction.action === 'waive') {
            await approveApplication(pendingAction.id, true);
            showToast('Approved with fee waived! Email sent to ' + pendingAction.email, 'success');
          } else if (pendingAction.action === 'remove') {
            const reason = document.getElementById('modalReasonTextarea').value.trim();
            await removeMember(pendingAction.id, reason);
            showToast('Member removed. Notification sent to ' + pendingAction.email, 'success');
          } else if (pendingAction.action === 'decline') {
            const reason = document.getElementById('modalReasonTextarea').value.trim();
            await declineApplication(pendingAction.id, reason);
            showToast('Application declined. Email sent to ' + pendingAction.email, 'success');
          }
        }
        closeModal();
        loadData();
      } catch (err) {
        showToast('Error: ' + err.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Retry';
      }
    }

    // RESEND with confirmation
    function confirmResend(id, name, email, btnEl) {
      if (!confirm('Resend welcome email with Stripe payment link to ' + name + ' (' + email + ')?')) return;
      doResendApproval(id, name, email, btnEl);
    }

    async function doResendApproval(id, name, email, btnEl) {
      if (btnEl) {
        btnEl.disabled = true;
        btnEl.textContent = 'Sending...';
      }
      try {
        await fetch(API + '/applications/' + id + '/approve', {
          method: 'PATCH',
          headers: apiHeaders()
        });
        showToast('Welcome email resent to ' + email, 'success');
      } catch (err) {
        showToast('Failed to resend email', 'error');
      } finally {
        if (btnEl) {
          btnEl.disabled = false;
          btnEl.textContent = 'Resend';
        }
      }
    }

    // EXPORT CSV
    function exportCSV() {
      if (applications.length === 0) {
        showToast('No applications to export', 'error');
        return;
      }

      const headers = ['Date', 'Name', 'Email', 'Phone', 'Company', 'Title', 'City', 'Tier', 'Status', 'Handicap', 'Frequency', 'Athletes', 'Referral', 'Notes'];
      const rows = applications.map(function(app) {
        return [
          formatDate(app.created_at || ''),
          getAppName(app),
          app.email || '',
          app.phone || app.phoneNumber || app.phone_number || '',
          app.company || '',
          app.jobTitle || app.job_title || app.title || '',
          app.city || '',
          getTierLabel(getTierClass(getAppTier(app))),
          (app.status || 'pending'),
          app.handicap || app.golfHandicap || app.golf_handicap || '',
          app.playFrequency || app.play_frequency || app.golfFrequency || app.golf_frequency || '',
          app.athletesInterested || app.athletes_interested || app.athletes || '',
          app.referralSource || app.referral_source || app.referral || '',
          app.additionalNotes || app.additional_notes || app.notes || ''
        ];
      });

      let csv = headers.map(csvCell).join(',') + '\n';
      rows.forEach(function(row) {
        csv += row.map(csvCell).join(',') + '\n';
      });

      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const today = new Date().toISOString().split('T')[0];
      a.href = url;
      a.download = 'cartpath-applications-' + today + '.csv';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showToast('CSV exported (' + applications.length + ' records)', 'success');
    }

    function csvCell(val) {
      const str = String(val || '');
      if (str.includes(',') || str.includes('"') || str.includes('\n')) {
        return '"' + str.replace(/"/g, '""') + '"';
      }
      return str;
    }

    // TOAST
    function showToast(msg, type) {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = 'toast ' + (type || '');
      toast.textContent = msg;
      container.appendChild(toast);
      setTimeout(function() {
        toast.classList.add('fade-out');
        setTimeout(function() {
          if (toast.parentNode) toast.parentNode.removeChild(toast);
        }, 300);
      }, 4000);
    }

    // POLLING
    function startPolling() {
      if (pollInterval) clearInterval(pollInterval);
      pollInterval = setInterval(async function() {
        try {
          const st = await fetchStats();
          const newTotal = st.total || 0;
          if (lastTotal !== null && newTotal > lastTotal) {
            document.getElementById('newAppIndicator').classList.add('visible');
            setTimeout(function() {
              document.getElementById('newAppIndicator').classList.remove('visible');
            }, 8000);
            loadData();
          }
          lastTotal = newTotal;
        } catch (e) {
          // silent fail on poll
        }
      }, 30000);
    }
  </script>
</body>
</html>
