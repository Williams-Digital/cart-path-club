<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Thank You — CartPath</title>
  <link rel="icon" href="/assets/cartpath-shield.png" type="image/png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Georgia, serif;
      background: #060F0A;
      color: #F5F0E1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
    }
    .card {
      max-width: 520px;
    }
    .logo {
      width: 72px;
      height: 72px;
      margin: 0 auto 24px;
    }
    .brand {
      font-size: 28px;
      font-weight: 300;
      letter-spacing: 10px;
      color: #BF9B3B;
      margin-bottom: 4px;
    }
    .est {
      font-size: 11px;
      letter-spacing: 4px;
      color: rgba(245,240,225,0.35);
      text-transform: uppercase;
      margin-bottom: 40px;
    }
    .check {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(109,200,109,0.1);
      border: 2px solid rgba(109,200,109,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      font-size: 36px;
    }
    h1 {
      font-size: 32px;
      font-weight: 400;
      color: #F5F0E1;
      margin-bottom: 16px;
    }
    p {
      font-size: 16px;
      color: rgba(245,240,225,0.6);
      line-height: 1.7;
      margin-bottom: 12px;
    }
    .note {
      font-size: 13px;
      color: rgba(245,240,225,0.4);
      margin-top: 32px;
      line-height: 1.6;
    }
    a {
      color: #BF9B3B;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="/assets/cartpath-shield.png" alt="CartPath" class="logo">
    <div class="brand">CARTPATH</div>
    <div class="est">Est. 2026</div>

    <div class="check">✓</div>
    <h1>Payment Received</h1>
    <p>Thank you. Your payment has been processed successfully.</p>
    <p>Check your email for next steps — our team will follow up within 24 hours.</p>

    <div class="note">
      Questions? <a href="mailto:hello@cartpathclub.com">hello@cartpathclub.com</a>
    </div>
  </div>
</body>
</html>
